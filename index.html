<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARK // OS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Simple Loader -->
    <div id="loading-screen">
        <h1 class="cyan-text">INITIALIZING...</h1>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div class="scanline"></div>

    <div id="trigger-1" class="scroll-section">
        <canvas id="canvas-1"></canvas>
        <div class="ui-overlay">
            <h1 class="giant-bold">I AM<br>OLAMIDE.</h1>
            <p class="stark-quote"><b>"THINGS ARE DIFFERENT NOW. I HAVE TO PROTECT THE ONE THING I CAN'T LIVE
                    WITHOUT."</b></p>
        </div>
    </div>

    <div id="trigger-2" class="scroll-section">
        <canvas id="canvas-2"></canvas>
        <div class="ui-overlay">
            <h1 class="giant-bold cyan-text">BUILD WITH<br>OLAMIDE</h1>
            <p class="stark-quote"><b>"PART OF THE JOURNEY IS THE END."</b></p>
        </div>
    </div>

    <footer class="stark-footer">
        <div class="footer-grid">
            <div class="grid-item">
                <span class="label">STATUS</span>
                <p class="status-ok">SYSTEMS NOMINAL</p>
            </div>
            <div class="grid-item">
                <span class="label">LOCATION</span>
                <p>NIGERIA // HQ</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>

</html>
